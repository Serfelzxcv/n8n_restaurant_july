components:
  schemas:
    CartaDia:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        fecha:
          type: string
          format: date
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemMenu'
      required:
      - fecha
      - id
      - items
    CategoriaEnum:
      enum:
      - entrada
      - fondo
      - extra
      type: string
      description: |-
        * `entrada` - Entrada
        * `fondo` - Fondo
        * `extra` - Plato Extra
    ItemMenu:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        carta:
          type: integer
          readOnly: true
        plato_id:
          type: integer
        cantidad:
          type: integer
          maximum: 2147483647
          minimum: 0
        precio:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
        titulo_seccion:
          type: string
          readOnly: true
      required:
      - carta
      - id
      - plato_id
      - precio
      - titulo_seccion
    ItemPedido:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        plato_id:
          type: integer
        cantidad:
          type: integer
          maximum: 2147483647
          minimum: 0
        detalle:
          type: string
          nullable: true
          maxLength: 500
        subtotal:
          type: number
          format: double
          readOnly: true
      required:
      - id
      - plato_id
      - subtotal
    PatchedCartaDia:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        fecha:
          type: string
          format: date
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemMenu'
    PatchedItemMenu:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        carta:
          type: integer
          readOnly: true
        plato_id:
          type: integer
        cantidad:
          type: integer
          maximum: 2147483647
          minimum: 0
        precio:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
        titulo_seccion:
          type: string
          readOnly: true
    PatchedPedido:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        numero_persona:
          type: integer
          maximum: 2147483647
          minimum: 0
        fecha:
          type: string
          format: date-time
          readOnly: true
        total:
          type: number
          format: double
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemPedido'
    PatchedPlato:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
          maxLength: 200
        descripcion:
          type: string
        precio:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        categoria:
          $ref: '#/components/schemas/CategoriaEnum'
    Pedido:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        numero_persona:
          type: integer
          maximum: 2147483647
          minimum: 0
        fecha:
          type: string
          format: date-time
          readOnly: true
        total:
          type: number
          format: double
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemPedido'
      required:
      - fecha
      - id
      - items
      - numero_persona
      - total
    Plato:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        nombre:
          type: string
          maxLength: 200
        descripcion:
          type: string
        precio:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        categoria:
          $ref: '#/components/schemas/CategoriaEnum'
      required:
      - categoria
      - id
      - nombre
      - precio
